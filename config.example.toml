# Codex CLI-style model configuration for killme-lite.
# Copy to config.toml and adjust if needed.

model = "gpt-5.5"
model_reasoning_effort = "xhigh"
llm_timeout = 120

# openai | deepseek | openai_then_deepseek_per_command
llm_mode = "openai"

# Startup-level agent routing: global | recommended | custom
# Change this in config.toml before launching a session; keeping routing fixed
# avoids mid-session model drift.
# global keeps the old single-model behavior.
# recommended uses role routing when your gateway can serve these model names:
#   chair/executioner/judge -> DeepSeek-V4-Pro
#   defender -> Kimi-K2.5
#   builder -> GLM-5.1
# custom uses [agent_models.<role>] overrides.
agent_model_profile = "global"

[model_providers.openai]
base_url = "https://api.openai.com/v1"
wire_api = "chat"

[model_providers.deepseek]
base_url = "https://api.deepseek.com"
wire_api = "chat"
model = "deepseek-v4-pro"
model_reasoning_effort = "high"
thinking = "enabled"

# Example custom routing through the same deepseek/paratera-compatible gateway:
#
# agent_model_profile = "custom"
#
# [agent_models.chair]
# model = "DeepSeek-V4-Pro"
# model_reasoning_effort = "high"
# thinking = "enabled"
#
# [agent_models.executioner]
# model = "DeepSeek-V4-Pro"
# model_reasoning_effort = "high"
# thinking = "enabled"
#
# [agent_models.defender]
# model = "Kimi-K2.5"
